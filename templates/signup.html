{% load static %}

<!DOCTYPE html>

<html>

<head>

    <title>Signup</title>

    <link
        rel="stylesheet"
        href="{% static 'css/style.css' %}"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

<div class="hero">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="glass-card">

                    <h2 class="text-center mb-4">

                        📝 Create Account

                    </h2>

                    {% if error %}

                    <div class="alert alert-danger">

                        {{ error }}

                    </div>

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <input
                            type="text"
                            name="username"
                            class="form-control mb-3"
                            placeholder="Username"
                        >

                        <input
                            type="password"
                            name="password"
                            class="form-control mb-3"
                            placeholder="Password"
                        >

                        <button
                            class="hero-btn w-100"
                        >

                            Signup

                        </button>

                    </form>

                    <div class="text-center mt-3">

                        <a
                            href="/login/"
                            class="text-info"
                        >

                            Already have account?

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
