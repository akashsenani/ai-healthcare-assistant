{% load static %}

<!DOCTYPE html>

<html>

<head>

    <title>Voice AI Assistant</title>

    <link
        rel="stylesheet"
        href="{% static 'css/style.css' %}"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>
<body class="dark-body">

<a href="/" class="home-btn">

    <i class="fa-solid fa-house"></i>

</a>

<div class="bg-blur blur1"></div>

<div class="bg-blur blur2"></div>
<div class="container mt-5">

    <div class="glass-card text-center voice-card">

        <h1 class="mb-5">

            🎙️ Voice AI Healthcare Assistant

        </h1>

        <!-- MICROPHONE BUTTON -->

        <button
            id="micBtn"
            class="voice-btn"
        >

            <i class="fa-solid fa-microphone"></i>

        </button>

        <h4 class="mt-4">

            Speak Your Health Question

        </h4>

        <!-- USER SPEECH -->

        <div class="glass-card mt-5">

            <h3>

                🗣️ Your Voice Input

            </h3>

            <p id="speechText">

                Waiting for speech...

            </p>

        </div>

        <!-- AI RESPONSE -->

        <div class="glass-card mt-5">

            <h3>

                🤖 AI Response

            </h3>

            <p id="aiResponse">

                AI response will appear here...

            </p>

        </div>

    </div>

</div>

<script>

const micBtn = document.getElementById(
    'micBtn'
);

const speechText = document.getElementById(
    'speechText'
);

const aiResponse = document.getElementById(
    'aiResponse'
);

// =====================================================
// SPEECH RECOGNITION
// =====================================================

const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

const recognition =
    new SpeechRecognition();

recognition.lang = 'en-US';

recognition.continuous = false;

recognition.interimResults = false;

// =====================================================
// MIC BUTTON CLICK
// =====================================================

micBtn.addEventListener(

    'click',

    () => {

        recognition.start();

        micBtn.innerHTML =
            '<i class="fa-solid fa-wave-square"></i>';

    }
);

// =====================================================
// SPEECH RESULT
// =====================================================

recognition.onresult = async (event) => {

    const transcript =
        event.results[0][0].transcript;

    speechText.innerHTML = transcript;

    // SEND TO DJANGO
    const response = await fetch(

        '/chatbot/voice-ai/',

        {

            method: 'POST',

            headers: {

                'Content-Type':
                    'application/json',

                'X-CSRFToken':
                    '{{ csrf_token }}'
            },

            body: JSON.stringify({

                message: transcript
            })
        }
    );

    const data = await response.json();

    aiResponse.innerHTML =
        data.response;

    // SPEAK RESPONSE
    const speech =
        new SpeechSynthesisUtterance(
            data.response
        );

    speech.lang = 'en-US';
    speech.rate = 1;

    speech.pitch = 1;

    speech.volume = 1;

    window.speechSynthesis.speak(
        speech
    );

    micBtn.innerHTML =
        '<i class="fa-solid fa-microphone"></i>';
};

</script>

</body>

</html>
